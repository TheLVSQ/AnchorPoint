name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        working-directory: /home/deploy/anchorpoint
        run: git pull origin main

      - name: Build Docker image
        working-directory: /home/deploy/anchorpoint/docker
        run: docker compose --env-file .env.production build

      - name: Recreate containers
        working-directory: /home/deploy/anchorpoint/docker
        # Database migrations run automatically on container startup via
        # docker/entrypoint.sh (migrate --noinput before gunicorn). A separate
        # migrate step here would race that one and fail with DuplicateTable.
        run: docker compose --env-file .env.production up -d
