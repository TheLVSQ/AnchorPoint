name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        working-directory: /home/deploy/anchorpoint
        run: git pull origin main

      - name: Build Docker image
        working-directory: /home/deploy/anchorpoint/docker
        run: docker compose --env-file .env.production build

      - name: Recreate containers
        working-directory: /home/deploy/anchorpoint/docker
        run: docker compose --env-file .env.production up -d

      - name: Run migrations
        working-directory: /home/deploy/anchorpoint/docker
        run: docker compose --env-file .env.production exec -T web python manage.py migrate
