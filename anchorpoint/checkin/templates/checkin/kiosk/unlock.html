{% extends "checkin/kiosk/base.html" %}
{% block title %}Staff Check-In{% endblock %}
{% block content %}
<div class="kiosk-card" style="max-width:400px;text-align:center;">
  <div class="kiosk-title">Staff PIN</div>
  <div class="kiosk-subtitle">Enter the kiosk PIN to begin check-in</div>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <input type="password" name="pin" maxlength="6" placeholder="••••"
             style="text-align:center;font-size:32px;letter-spacing:12px;"
             autofocus autocomplete="off">
      {% if form.pin.errors %}
        <div class="error-text">{{ form.pin.errors.0 }}</div>
      {% endif %}
    </div>
    <button type="submit" class="btn btn-primary btn-lg">Unlock</button>
  </form>
</div>
{% endblock %}
