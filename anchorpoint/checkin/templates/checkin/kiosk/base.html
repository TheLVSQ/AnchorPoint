<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Check-In{% endblock %} | {{ org.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Outfit', system-ui, sans-serif;
      background: #0a0a14;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }
    .kiosk-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
    }
    .kiosk-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .kiosk-header .org-name {
      font-size: 22px;
      font-weight: 700;
      color: #e8e8f0;
      letter-spacing: 0.02em;
    }
    .kiosk-card {
      background: #16162a;
      border: 1px solid #2a2a44;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 600px;
    }
    .kiosk-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .kiosk-subtitle {
      font-size: 15px;
      color: #8888aa;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.85; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-secondary { background: #2a2a44; color: #ccc; }
    .btn-lg { padding: 18px 36px; font-size: 18px; width: 100%; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 14px; color: #8888aa; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: #0d0d20;
      border: 1px solid #2a2a44;
      border-radius: 8px;
      color: #fff;
      font-size: 18px;
      font-family: 'Outfit', sans-serif;
      padding: 12px 16px;
      outline: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: #4f46e5;
    }
    .error-text { color: #f87171; font-size: 14px; margin-top: 4px; }

    /* Print styles */
    @media print {
      body * { visibility: hidden; }
      .print-labels, .print-labels * { visibility: visible; }
      .print-labels {
        display: block !important;
        position: fixed;
        left: 0;
        top: 0;
      }
      @page {
        size: 62mm auto;
        margin: 0;
      }
      .label {
        width: 62mm;
        page-break-after: always;
        font-family: 'Outfit', sans-serif;
        padding: 10px 14px;
        background: white;
        color: black;
      }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="kiosk-wrap">
    <header class="kiosk-header">
      {% if org.logo %}
        <img src="{{ org.logo.url }}" alt="{{ org.name }}" style="height:48px;margin-bottom:8px;">
      {% endif %}
      <div class="org-name">{{ org.name }}</div>
    </header>
    {% block content %}{% endblock %}
  </div>
  {% block extra_js %}{% endblock %}
</body>
</html>
